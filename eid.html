<!DOCTYPE html>
<html>
<head>
    <title>Happy Eid My Love ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            overflow: hidden;
        }

        h1 {
            margin-top: 80px;
            font-size: 50px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 30px yellow; }
        }

        p {
            font-size: 24px;
        }

        .heart {
            font-size: 70px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            background: red;
            color: white;
            cursor: pointer;
        }

        .falling {
            position: absolute;
            color: white;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10vh); }
            to { transform: translateY(100vh); }
        }
    </style>
</head>

<body>

<h1>🌙 Happy Eid My Love ❤️</h1>

<p>My life is beautiful because of you 💖</p>

<div class="heart">❤️</div>

<button onclick="showMessage()">Click for Surprise 💌</button>

<audio autoplay loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" type="audio/wav">
</audio>

<script>
function showMessage() {
    alert("Eid Mubarak jaan 💕 I love you forever 😘");
}

// Falling hearts
for (let i = 0; i < 30; i++) {
    let heart = document.createElement("div");
    heart.className = "falling";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
