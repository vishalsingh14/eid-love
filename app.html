<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG VR GROUP</title>
    <style>
        :root {
            --primary: #000000;
            --accent: #ff2e63;
            --soft-pink: #ffeef2;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        .page { height: 100vh; width: 100vw; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
        .active { display: flex; }

        /* --- PAGE 1: LOGO ANIMATION --- */
        #page1 { background: radial-gradient(circle, #222 0%, #000 100%); }
        .logo-container { animation: glow 2s ease-in-out infinite alternate; }
        .logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; letter-spacing: 8px; margin-bottom: 30px; }
        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--accent); }
            to { text-shadow: 0 0 20px #fff, 0 0 40px var(--accent), 0 0 60px var(--accent); }
        }

        /* --- PAGE 2: GAME --- */
        #page2 { background: #f0f2f5; color: #333; }
        .game-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 85%; max-width: 400px; z-index: 10; }
        .choices { display: flex; gap: 15px; justify-content: center; margin: 25px 0; }
        .choice-btn { font-size: 2.5rem; padding: 15px; border-radius: 20px; border: 2px solid #eee; background: white; cursor: pointer; transition: 0.3s; }
        .choice-btn:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(255, 46, 99, 0.2); }
        #status { height: 50px; font-weight: 600; color: #ff4757; }

        /* --- PAGE 3: LOVE REVEAL --- */
        #page3 { background: var(--soft-pink); color: var(--accent); overflow: hidden; }
        .main-heart { font-size: 8rem; filter: drop-shadow(0 0 20px rgba(255, 46, 99, 0.4)); animation: heartbeat 1.2s infinite; z-index: 2; }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }
        .falling-heart { position: absolute; top: -10%; color: var(--accent); opacity: 0.6; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Common Button Styling */
        .btn { padding: 15px 45px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; background: var(--accent); color: white; transition: 0.4s; }
        .btn:hover { letter-spacing: 2px; box-shadow: 0 0 30px var(--accent); }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <div class="logo-container">
            <div class="logo">BIG VR GROUP</div>
        </div>
        <button class="btn" onclick="showPage('page2')">CONTINUE</button>
    </div>

    <div id="page2" class="page">
        <div class="game-card">
            <h2 style
