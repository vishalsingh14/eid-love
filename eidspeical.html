<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Ultimate Eid Celebration & Games</title>
    <style>
        :root { --gold: #ffd700; --emerald: #065f46; --berry: #be185d; }
        body {
            background: radial-gradient(circle at center, #1e293b, #020617);
            color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0;
        }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Eid Wish Popups */
        #wishOverlay {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.9); color: black;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            display: none; z-index: 100; box-shadow: 0 0 20px gold;
            animation: pulse 1s infinite;
        }

        /* Long Paragraph Styling */
        .long-text {
            background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px;
            line-height: 1.9; text-align: justify; border: 1px solid var(--gold);
            margin: 30px 0; font-size: 1.1rem;
        }

        .game-area {
            background: #000; border: 4px solid var(--gold);
            margin: 20px auto; position: relative; display: none;
            box-shadow: 0 0 30px rgba(255,215,0,0.2);
        }
        canvas { display: block; background: #111; cursor: crosshair; }
        
        .btn {
            background: linear-gradient(to right, var(--gold), #facc15);
            color: #000; border: none; padding: 12px 25px; 
            font-size: 1rem; font-weight: bold; border-radius: 8px;
            cursor: pointer; margin: 10px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }
        
        .emoji-float { font-size: 4rem; cursor: pointer; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }
    </style>
</head>
<body>

<div id="wishOverlay">✨ EID MUBARAK! ✨</div>

    <div class="emoji-float" onclick="triggerWish('A Big Warm Hug for You! 🤗')">🤗 😊</div>
    <h1>🌙 Eid Al-Fitr Celebration 🌙</h1>
